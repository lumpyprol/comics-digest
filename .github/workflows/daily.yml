name: Daily comics digest

on:
  schedule:
    # 13:00 UTC daily (comics are usually posted by then; adjust to taste)
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write   # needed to commit the day's images back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser pyyaml requests-oauthlib

      - name: Build digest and download strip images
        env:
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python build_and_send.py build

      - name: Commit and push images
        run: |
          git config user.name "comics-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/
          git commit -m "Images for $(date -u +%F)" || echo "Nothing new to commit"
          git push

      - name: Wait for Pages deploy, then upload to Instapaper
        env:
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}
        run: python build_and_send.py save
