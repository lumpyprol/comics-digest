name: Daily comics digest

on:
  schedule:
    # 13:00 UTC daily (comics are usually posted by then; adjust to taste)
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser pyyaml requests-oauthlib

      - name: Build digest and upload to Instapaper
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}
        run: python build_and_send.py
